<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #F6F4F0; padding: 20px; font-family: 'Barlow', sans-serif; }
.row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.token { font-family: 'DM Mono'; font-size: 11px; color: #8A8680; width: 64px; flex-shrink: 0; }
.bar { height: 20px; background: #E8471A; border-radius: 3px; }
.val { font-size: 12px; color: #5A5955; font-weight: 500; }
.section { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #8A8680; margin: 16px 0 8px; }
.radius-row { display: flex; gap: 10px; flex-wrap: wrap; }
.radius-box { background: white; border: 1px solid #E2DED8; width: 56px; height: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.radius-label { font-family: 'DM Mono'; font-size: 10px; color: #8A8680; margin-top: 4px; }
</style>
</head>
<body>
  <div class="section">Spacing Scale</div>
  <div class="row"><span class="token">space-1</span><div class="bar" style="width:4px"></div><span class="val">4px</span></div>
  <div class="row"><span class="token">space-2</span><div class="bar" style="width:8px"></div><span class="val">8px</span></div>
  <div class="row"><span class="token">space-3</span><div class="bar" style="width:12px"></div><span class="val">12px</span></div>
  <div class="row"><span class="token">space-4</span><div class="bar" style="width:16px"></div><span class="val">16px</span></div>
  <div class="row"><span class="token">space-6</span><div class="bar" style="width:24px"></div><span class="val">24px</span></div>
  <div class="row"><span class="token">space-8</span><div class="bar" style="width:32px"></div><span class="val">32px</span></div>
  <div class="row"><span class="token">space-12</span><div class="bar" style="width:48px"></div><span class="val">48px</span></div>
  <div class="row"><span class="token">space-16</span><div class="bar" style="width:64px"></div><span class="val">64px</span></div>

  <div class="section">Border Radius</div>
  <div class="radius-row">
    <div><div class="radius-box" style="border-radius:4px"></div><div class="radius-label">sm · 4</div></div>
    <div><div class="radius-box" style="border-radius:8px"></div><div class="radius-label">md · 8</div></div>
    <div><div class="radius-box" style="border-radius:12px"></div><div class="radius-label">lg · 12</div></div>
    <div><div class="radius-box" style="border-radius:16px"></div><div class="radius-label">xl · 16</div></div>
    <div><div class="radius-box" style="border-radius:9999px"></div><div class="radius-label">pill</div></div>
  </div>
</body>
</html>
