<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Barlow', sans-serif; background: #F6F4F0; padding: 20px; }
.grid { display: flex; flex-wrap: wrap; gap: 10px; }
.swatch { border-radius: 8px; overflow: hidden; width: 120px; }
.swatch-color { height: 56px; }
.swatch-label { background: white; padding: 8px 10px; border: 1px solid #E2DED8; border-top: none; border-radius: 0 0 8px 8px; }
.swatch-name { font-size: 11px; font-weight: 600; color: #111110; }
.swatch-hex { font-family: 'DM Mono', monospace; font-size: 10px; color: #8A8680; margin-top: 2px; }
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono&display=swap" rel="stylesheet">
</head>
<body>
<div class="grid">
  <div class="swatch">
    <div class="swatch-color" style="background:#E8471A"></div>
    <div class="swatch-label"><div class="swatch-name">Brand Orange</div><div class="swatch-hex">#E8471A</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#F26540"></div>
    <div class="swatch-label"><div class="swatch-name">Orange Light</div><div class="swatch-hex">#F26540</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#111110; border: 1px solid #E2DED8;"></div>
    <div class="swatch-label"><div class="swatch-name">Near Black</div><div class="swatch-hex">#111110</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#1C1C1A"></div>
    <div class="swatch-label"><div class="swatch-name">Surface Dark</div><div class="swatch-hex">#1C1C1A</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#5A5955"></div>
    <div class="swatch-label"><div class="swatch-name">Gray 600</div><div class="swatch-hex">#5A5955</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#8A8680"></div>
    <div class="swatch-label"><div class="swatch-name">Gray 400</div><div class="swatch-hex">#8A8680</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#E2DED8"></div>
    <div class="swatch-label"><div class="swatch-name">Border</div><div class="swatch-hex">#E2DED8</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#F6F4F0"></div>
    <div class="swatch-label"><div class="swatch-name">Surface</div><div class="swatch-hex">#F6F4F0</div></div>
  </div>
</div>
</body>
</html>
